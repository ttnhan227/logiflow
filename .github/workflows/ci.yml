name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
      - name: Build and test backend
        run: mvn -B -f server/pom.xml test

  frontend:
    name: Frontend build
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: |
          cd client
          npm ci
      - name: Lint
        run: |
          cd client
          npm run lint
      - name: Build
        run: |
          cd client
          npm run build

  mobile:
    name: Flutter validation
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
      - name: Install dependencies
        run: |
          cd client_mobile
          flutter pub get
      - name: Analyze Flutter code
        run: |
          cd client_mobile
          flutter analyze
