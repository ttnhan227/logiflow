spring.application.name=server

server.port=8080
server.address=0.0.0.0


spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/logiflow}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Application version
app.version=1.0.0

# Enable scheduling
spring.main.allow-bean-definition-overriding=true

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cloudinary Configuration - Root API Key Pair
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# File Upload Configuration (Cloudinary)
app.upload.max-size=5242880
app.upload.folder.profile-pictures=logiflow/profile-pictures
app.upload.folder.license-images=logiflow/license-images
app.upload.folder.cv-documents=logiflow/cv-documents
app.upload.folder.business-licenses=logiflow/business-licenses
app.upload.folder.tax-certificates=logiflow/tax-certificates
app.upload.folder.company-logos=logiflow/company-logos

# Mistral AI Configuration
spring.ai.mistralai.api-key=${MISTRAL_AI_API_KEY:}

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Email Configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# PayPal Configuration (Sandbox)
paypal.mode=sandbox
paypal.client.id=${PAYPAL_CLIENT_ID:}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:}
paypal.return.url=${PAYPAL_RETURN_URL:http://localhost:8080/api/payment/return}
paypal.cancel.url=${PAYPAL_CANCEL_URL:http://localhost:8080/api/payment/cancel}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
